name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: '发布 GitHub Release（关闭则仅构建 APK）'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > $GITHUB_WORKSPACE/release.jks

      - name: Resolve release version
        id: release_version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            BRANCH_REF="${GITHUB_REF_NAME:-manual}"
            BRANCH_VERSION=$(printf '%s' "$BRANCH_REF" | tr '[:upper:]' '[:lower:]' | tr '/' '-' | sed -E 's/[^a-z0-9._-]+/-/g; s/-+/-/g; s/^-//; s/-$//')
            if [[ -z "$BRANCH_VERSION" ]]; then
              BRANCH_VERSION="manual"
            fi
            VERSION="YanamiNext-Build-${BRANCH_VERSION}-${GITHUB_SHA::7}"
          fi
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        working-directory: apps/android
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew \
            -PyanamiVersionName="${{ steps.release_version.outputs.name }}" \
            -PyanamiVersionCode="$GITHUB_RUN_NUMBER" \
            assembleRelease

      - name: Rename APKs
        run: |
          VERSION=${{ steps.release_version.outputs.name }}
          cd apps/android/app/build/outputs/apk/release
          for apk in *.apk; do
            if [[ "$apk" == *"universal"* ]]; then
              mv "$apk" "YanamiNext-v${VERSION}-universal.apk"
            elif [[ "$apk" == *"arm64-v8a"* ]]; then
              mv "$apk" "YanamiNext-v${VERSION}-arm64-v8a.apk"
            elif [[ "$apk" == *"armeabi-v7a"* ]]; then
              mv "$apk" "YanamiNext-v${VERSION}-armeabi-v7a.apk"
            fi
          done

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: YanamiNext-${{ steps.release_version.outputs.name }}
          path: apps/android/app/build/outputs/apk/release/YanamiNext-*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_release == true
        uses: softprops/action-gh-release@v2
        with:
          name: YanamiNext ${{ steps.release_version.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: apps/android/app/build/outputs/apk/release/YanamiNext-*.apk

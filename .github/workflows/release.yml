name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: '发布 GitHub Release（关闭则仅构建 APK）'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > $GITHUB_WORKSPACE/release.jks

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename APKs
        run: |
          VERSION=${{ steps.version.outputs.name }}
          cd app/build/outputs/apk/release
          for apk in *.apk; do
            if [[ "$apk" == *"universal"* ]]; then
              mv "$apk" "Yanami-v${VERSION}-universal.apk"
            elif [[ "$apk" == *"arm64-v8a"* ]]; then
              mv "$apk" "Yanami-v${VERSION}-arm64-v8a.apk"
            elif [[ "$apk" == *"armeabi-v7a"* ]]; then
              mv "$apk" "Yanami-v${VERSION}-armeabi-v7a.apk"
            fi
          done

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Yanami-${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/release/Yanami-*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_release == true
        uses: softprops/action-gh-release@v2
        with:
          name: Yanami ${{ steps.version.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: app/build/outputs/apk/release/Yanami-*.apk

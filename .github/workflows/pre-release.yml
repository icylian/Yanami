name: Test & Pre-release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pre-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  android-review:
    name: Android review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve build version
        id: build_version
        run: |
          BRANCH_REF="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-local}}"
          BRANCH_VERSION=$(printf '%s' "$BRANCH_REF" | tr '[:upper:]' '[:lower:]' | tr '/' '-' | sed -E 's/[^a-z0-9._-]+/-/g; s/-+/-/g; s/^-//; s/-$//')
          if [[ -z "$BRANCH_VERSION" ]]; then
            BRANCH_VERSION="local"
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="YanamiNext-Build-${BRANCH_VERSION}-${SHORT_SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test and build debug APK
        working-directory: apps/android
        run: |
          chmod +x ./gradlew
          ./gradlew \
            -PyanamiVersionName="${{ steps.build_version.outputs.version }}" \
            -PyanamiVersionCode="$GITHUB_RUN_NUMBER" \
            testDebugUnitTest assembleDebug

      - name: Run Android lint
        continue-on-error: true
        working-directory: apps/android
        run: |
          ./gradlew \
            -PyanamiVersionName="${{ steps.build_version.outputs.version }}" \
            -PyanamiVersionCode="$GITHUB_RUN_NUMBER" \
            lintDebug

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: yanaminext-debug-apks
          path: apps/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yanaminext-lint-report
          path: apps/android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  iphone-review:
    name: iPhone review
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned iPhone device app
        run: |
          xcodebuild \
            -project apps/iphone/Yanami.xcodeproj \
            -scheme Yanami \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            MARKETING_VERSION="1.0" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            build

      - name: Package unsigned iPhone IPA
        run: |
          BRANCH_REF="${GITHUB_REF_NAME:-local}"
          BRANCH_VERSION=$(printf '%s' "$BRANCH_REF" | tr '[:upper:]' '[:lower:]' | tr '/' '-' | sed -E 's/[^a-z0-9._-]+/-/g; s/-+/-/g; s/^-//; s/-$//')
          if [[ -z "$BRANCH_VERSION" ]]; then
            BRANCH_VERSION="local"
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="YanamiNext-Build-${BRANCH_VERSION}-${SHORT_SHA}"
          mkdir -p prerelease/iphone
          APP_PATH="build/ios/Build/Products/Release-iphoneos/Yanami.app"
          test -d "$APP_PATH"
          mkdir -p prerelease/iphone/Payload
          ditto "$APP_PATH" prerelease/iphone/Payload/YanamiNext.app
          (cd prerelease/iphone && ditto -c -k --sequesterRsrc --keepParent Payload "${VERSION}.ipa")

      - name: Upload iPhone IPA
        uses: actions/upload-artifact@v4
        with:
          name: yanaminext-iphone-ipa
          path: prerelease/iphone/*.ipa
          if-no-files-found: error

  pre-release:
    name: Publish pre-release
    runs-on: ubuntu-latest
    needs:
      - android-review
      - iphone-review
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download debug APKs
        uses: actions/download-artifact@v4
        with:
          name: yanaminext-debug-apks
          path: prerelease/raw/android

      - name: Download iPhone IPA
        uses: actions/download-artifact@v4
        with:
          name: yanaminext-iphone-ipa
          path: prerelease/raw/iphone

      - name: Prepare release assets
        id: assets
        run: |
          BRANCH_REF="${GITHUB_REF_NAME:-local}"
          BRANCH_VERSION=$(printf '%s' "$BRANCH_REF" | tr '[:upper:]' '[:lower:]' | tr '/' '-' | sed -E 's/[^a-z0-9._-]+/-/g; s/-+/-/g; s/^-//; s/-$//')
          if [[ -z "$BRANCH_VERSION" ]]; then
            BRANCH_VERSION="local"
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="YanamiNext-Build-${BRANCH_VERSION}-${SHORT_SHA}"
          mkdir -p prerelease/assets

          for apk in prerelease/raw/android/*.apk; do
            name=$(basename "$apk")
            if [[ "$name" == *"universal"* ]]; then
              target="${VERSION}-pre-release-universal.apk"
            elif [[ "$name" == *"arm64-v8a"* ]]; then
              target="${VERSION}-pre-release-arm64-v8a.apk"
            elif [[ "$name" == *"armeabi-v7a"* ]]; then
              target="${VERSION}-pre-release-armeabi-v7a.apk"
            else
              target="${VERSION}-pre-release-debug.apk"
            fi
            cp "$apk" "prerelease/assets/$target"
          done

          for ipa in prerelease/raw/iphone/*.ipa; do
            cp "$ipa" "prerelease/assets/${VERSION}.ipa"
          done

          echo "branch_version=$BRANCH_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "release_tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create pre-release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.assets.outputs.release_tag }}" "$GITHUB_SHA"
          git push origin "refs/tags/${{ steps.assets.outputs.release_tag }}" --force

      - name: Publish GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.assets.outputs.release_tag }}
          name: YanamiNext Pre-release ${{ steps.assets.outputs.version }}
          body: |
            Automated pre-release build from `${{ github.sha }}`.

            Version: `${{ steps.assets.outputs.version }}`
            Branch version: `${{ steps.assets.outputs.branch_version }}`
            Build number: `${{ steps.assets.outputs.build_number }}`

            This build passed:
            - `testDebugUnitTest`
            - `assembleDebug`
            - `xcodebuild` for the unsigned iPhone device IPA

            The iPhone IPA is unsigned and must be signed before device installation.

            `lintDebug` is uploaded as a non-blocking report artifact.
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: prerelease/assets/YanamiNext-*

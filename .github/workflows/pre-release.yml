name: Test & Pre-release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pre-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  android-review:
    name: Android review
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest assembleDebug

      - name: Run Android lint
        continue-on-error: true
        run: |
          ./gradlew lintDebug

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: yanami-debug-apks
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yanami-lint-report
          path: android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  iphone-review:
    name: iPhone review
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned iPhone device app
        run: |
          BASE_VERSION=$(grep 'versionName' android/app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          xcodebuild \
            -project ios/Yanami.xcodeproj \
            -scheme Yanami \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            MARKETING_VERSION="$BASE_VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            build

      - name: Package unsigned iPhone IPA
        run: |
          BASE_VERSION=$(grep 'versionName' android/app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VERSION="${BASE_VERSION}-${GITHUB_RUN_NUMBER}"
          mkdir -p prerelease/iphone
          APP_PATH="build/ios/Build/Products/Release-iphoneos/Yanami.app"
          test -d "$APP_PATH"
          mkdir -p prerelease/iphone/Payload
          ditto "$APP_PATH" prerelease/iphone/Payload/Yanami.app
          (cd prerelease/iphone && ditto -c -k --sequesterRsrc --keepParent Payload "Yanami-v${VERSION}.ipa")

      - name: Upload iPhone IPA
        uses: actions/upload-artifact@v4
        with:
          name: yanami-iphone-ipa
          path: prerelease/iphone/*.ipa
          if-no-files-found: error

  pre-release:
    name: Publish pre-release
    runs-on: ubuntu-latest
    needs:
      - android-review
      - iphone-review
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download debug APKs
        uses: actions/download-artifact@v4
        with:
          name: yanami-debug-apks
          path: prerelease/raw/android

      - name: Download iPhone IPA
        uses: actions/download-artifact@v4
        with:
          name: yanami-iphone-ipa
          path: prerelease/raw/iphone

      - name: Prepare release assets
        id: assets
        run: |
          BASE_VERSION=$(grep 'versionName' android/app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SHORT_SHA="${GITHUB_SHA::7}"
          SAFE_BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9]/-/g')
          VERSION="${BASE_VERSION}-${SAFE_BRANCH}-${SHORT_SHA}"
          TAG_NAME="pre-release-${SAFE_BRANCH}-${SHORT_SHA}"
          mkdir -p prerelease/assets

          for apk in prerelease/raw/android/*.apk; do
            name=$(basename "$apk")
            if [[ "$name" == *"universal"* ]]; then
              target="Yanami-v${VERSION}-pre-release-universal.apk"
            elif [[ "$name" == *"arm64-v8a"* ]]; then
              target="Yanami-v${VERSION}-pre-release-arm64-v8a.apk"
            elif [[ "$name" == *"armeabi-v7a"* ]]; then
              target="Yanami-v${VERSION}-pre-release-armeabi-v7a.apk"
            else
              target="Yanami-v${VERSION}-pre-release-debug.apk"
            fi
            cp "$apk" "prerelease/assets/$target"
          done

          for ipa in prerelease/raw/iphone/*.ipa; do
            cp "$ipa" "prerelease/assets/Yanami-v${VERSION}.ipa"
          done

          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.assets.outputs.tag_name }}
          name: Yanami Pre-release ${{ steps.assets.outputs.version }}
          body: |
            Automated pre-release build from `${{ github.sha }}` on branch `${{ github.ref_name }}`.

            Version: `${{ steps.assets.outputs.version }}`
            Build number: `${{ steps.assets.outputs.build_number }}`

            This build passed:
            - `testDebugUnitTest`
            - `assembleDebug`
            - `xcodebuild` for the unsigned iPhone device IPA

            The iPhone IPA is unsigned and must be signed before device installation.

            `lintDebug` is uploaded as a non-blocking report artifact.
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: prerelease/assets/Yanami-*
